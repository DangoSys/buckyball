name: Buckyball Tapeout CI (Test)
run-name: ${{ github.actor }} Tapeout Test 🚀
on:
  push:
    branches:
      - feature/tapeout-ci

permissions:
  contents: read
  checks: write

concurrency:
  group: buckyball-tapeout-ci
  cancel-in-progress: false

jobs:
  tapeout:
    name: Tapeout Flow
    runs-on: cpu-server-tapeout
    steps:
      - name: Print information
        run: |
          echo "🎉 Tapeout CI Test"
          echo "🔎 Branch: ${{ github.ref_name }}"

      - name: Setup tapeout repo
        shell: bash
        run: |
          TAPEOUT_DIR=~/Code/tapeout
          if [ ! -d "$TAPEOUT_DIR/.git" ]; then
            echo "Cloning tapeout..."
            git clone --depth 1 https://github.com/DangoSys/tapeout.git "$TAPEOUT_DIR"
            cd "$TAPEOUT_DIR"
            git submodule update --init --force
          fi
          echo "Tapeout repo ready"

      - name: Create test RTL
        shell: bash
        run: |
          TAPEOUT_RTL=~/Code/tapeout/0_RTL/RTL
          rm -rf "$TAPEOUT_RTL"
          mkdir -p "$TAPEOUT_RTL"

          cat > "$TAPEOUT_RTL/dut.sv" << 'VERILOG_EOF'
          module dut (
            input  logic        clock,
            input  logic        reset,
            input  logic [7:0]  a,
            input  logic [7:0]  b,
            output logic [8:0]  sum,
            output logic        carry
          );
            always_ff @(posedge clock or posedge reset) begin
              if (reset) begin
                sum   <= 9'd0;
                carry <= 1'b0;
              end else begin
                {carry, sum} <= {1'b0, a} + {1'b0, b};
              end
            end
          endmodule
          VERILOG_EOF

          echo "dut.sv" > "$TAPEOUT_RTL/filelist.f"
          echo "RTL created:"
          cat "$TAPEOUT_RTL/filelist.f"

      - name: Run tapeout SRAM gen
        shell: bash
        run: |
          cd ~/Code/tapeout/0_RTL
          python3 scripts/gen_real_sram_libs.py || echo "[skip] No SRAMs found (OK for test)"
          # Ensure manifest files exist (empty if no SRAMs)
          MANDIR=real_sram_libs
          mkdir -p "$MANDIR"
          if [ ! -f "$MANDIR/macro_manifest.csv" ]; then
            echo "rtl_module,port_type,implementation,copies,logical_depth,logical_width,logical_bit_lo,slice_logical_width,physical_depth,physical_width,compiler,config,status,message,kit_dir,liberty_files,db_files,verilog_files,lef_files,gds_files,spice_files" > "$MANDIR/macro_manifest.csv"
          fi
          if [ ! -f "$MANDIR/rtl_sram_manifest.csv" ]; then
            echo "module,source,logical_depth,logical_width,port_type,status,reason" > "$MANDIR/rtl_sram_manifest.csv"
          fi

      - name: Run tapeout synthesis
        shell: bash
        run: |
          cd ~/Code/tapeout
          TOP_MODULE=dut
          RUN_TAG="test_$(date +%Y%m%d_%H%M%S)"
          export TOP_MODULE RUN_TAG
          export CLOCK_PORT=clock CLOCK_NAME=clock
          . config/env.sh
          cd 1_SYN
          mkdir -p alib-52 elab logs outputs rpt
          rm -rf elab/*
          mkdir -p "outputs/$RUN_TAG" "rpt/$RUN_TAG"
          python3 ./scripts/sramReplace.py
          dc_shell -f ./scripts/dc.tcl -x "set RUN_TAG {$RUN_TAG}" | tee "logs/dc_${RUN_TAG}.log"
          # Check for REAL errors (not Tcl source code echoes)
          if grep -E "^Error:|FATAL:.*failed" "logs/dc_${RUN_TAG}.log" >/dev/null; then
            echo "DC synthesis failed!" >&2
            exit 1
          fi
          echo "DC synthesis complete"

      - name: Collect synthesis results
        shell: bash
        if: always()
        run: |
          mkdir -p ~/tapeout_test_results/reports
          mkdir -p ~/tapeout_test_results/netlist

          cp -r ~/Code/tapeout/1_SYN/rpt/* ~/tapeout_test_results/reports/ 2>/dev/null || true
          SYN_OUTPUTS=~/Code/tapeout/1_SYN/outputs
          if [ -d "$SYN_OUTPUTS" ]; then
            LATEST=$(ls -td "$SYN_OUTPUTS"/*/ 2>/dev/null | head -1)
            if [ -n "$LATEST" ]; then
              cp -r "$LATEST"/* ~/tapeout_test_results/netlist/ 2>/dev/null || true
            fi
          fi

          echo "=== Results ==="
          find ~/tapeout_test_results -type f 2>/dev/null | sort || true

          echo ""
          echo "=== Area Report ==="
          for rpt in ~/tapeout_test_results/reports/*/*_mapped_area.rpt; do
            [ -f "$rpt" ] || continue
            grep -E "Total|cell area|Area" "$rpt" | head -10
          done

          echo ""
          echo "=== Timing Report ==="
          for rpt in ~/tapeout_test_results/reports/*/*_timing_max_path.rpt; do
            [ -f "$rpt" ] || continue
            grep -E "slack|data required|data arrival" "$rpt" | head -10
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tapeout-test-results
          path: ~/tapeout_test_results/
          retention-days: 7
