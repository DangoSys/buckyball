name: Buckyball Tapeout CI
run-name: ${{ github.actor }} Tapeout PPA 🚀
on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Verilator config class'
        required: true
        default: 'sims.verilator.BuckyballPebbleVerilatorConfig'
        type: string
      top_module:
        description: 'Synthesis top module name'
        required: true
        default: 'BuckyballAccelerator'
        type: string
  push:
    branches:
      - main
      - feature/tapeout-ci
  pull_request:
    branches:
      - main
    paths:
      - 'arch/src/main/scala/**'

permissions:
  contents: read
  checks: write

concurrency:
  group: buckyball-tapeout-ci
  cancel-in-progress: false

jobs:
  tapeout:
    name: Tapeout Flow
    runs-on: cpu-server-tapeout
    env:
      ALL_PROXY: socks5h://127.0.0.1:17890
    steps:
      - name: Print information
        run: |
          echo "🎉 Tapeout CI triggered by ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🔎 PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          fi
          echo "🔎 Repository: ${{ github.repository }}"

      - name: Reset buckyball to clean state
        shell: zsh {0}
        run: |
          cd ~/Code/buckyball
          git fetch --force --prune origin "${{ github.ref }}"
          git checkout --detach FETCH_HEAD
          git reset --hard FETCH_HEAD
          git clean -ffd
          git submodule sync bbdev bebop compiler/thirdparty/buddy-mlir
          git submodule update --init --force bbdev bebop compiler/thirdparty/buddy-mlir
          for submodule in bbdev bebop compiler/thirdparty/buddy-mlir; do
            git -C "$submodule" reset --hard
            git -C "$submodule" clean -ffd
          done

      - name: Nix build
        shell: zsh {0}
        run: |
          cd ~/Code/buckyball
          nix build

      - name: Generate Verilog
        shell: zsh {0}
        env:
          CONFIG: ${{ inputs.config || 'sims.verilator.BuckyballPebbleVerilatorConfig' }}
        run: |
          cd ~/Code/buckyball
          nix develop -c bbdev bebop-verilator --clean "--config ${CONFIG}"
          nix develop -c bbdev bebop-verilator --verilog "--config ${CONFIG}"

      - name: Prepare tapeout RTL
        shell: bash
        run: |
          TOP_MODULE="${{ inputs.top_module || 'BuckyballAccelerator' }}"
          TAPEOUT_DIR=~/Code/tapeout
          if [ ! -d "$TAPEOUT_DIR/.git" ]; then
            echo "Cloning tapeout..."
            git clone --depth 1 --branch fix/run_all-stability https://github.com/DangoSys/tapeout.git "$TAPEOUT_DIR" || exit 1
            cd "$TAPEOUT_DIR" && git submodule update --init --force || true
          fi

          VERILOG_DIR=$(find ~/Code/buckyball/arch/build -maxdepth 2 -name "${TOP_MODULE}.sv" -type f 2>/dev/null | head -1 | xargs dirname)
          if [ -z "$VERILOG_DIR" ]; then
            echo "ERROR: ${TOP_MODULE}.sv not found in arch/build/" >&2; exit 1
          fi

          TAPEOUT_RTL="$TAPEOUT_DIR/0_RTL/RTL"
          rm -rf "$TAPEOUT_RTL"
          mkdir -p "$TAPEOUT_RTL"
          cp "$VERILOG_DIR"/*.sv "$TAPEOUT_RTL/" 2>/dev/null || true
          cp "$VERILOG_DIR"/*.v "$TAPEOUT_RTL/" 2>/dev/null || true
          (cd "$TAPEOUT_RTL" && ls *.sv *.v 2>/dev/null > filelist.f)
          echo "RTL ready: $(wc -l < "$TAPEOUT_RTL/filelist.f") files from $VERILOG_DIR"

      - name: Run tapeout synthesis
        shell: bash
        run: |
          TOP_MODULE="${{ inputs.top_module || 'BuckyballAccelerator' }}"
          cd ~/Code/tapeout
          export TOP_MODULE CLOCK_PORT=clock_uncore CLOCK_NAME=clock_uncore RUN_TAG="${GITHUB_RUN_ID:-manual}"

          echo "=== Stage 0: SRAM collateral generation ==="
          cd 0_RTL && python3 scripts/gen_real_sram_libs.py 2>&1 | tail -3
          cd ..

          echo "=== Stage 1-2: DC synthesis ==="
          cd 1_SYN
          . ../config/env.sh
          python3 ./scripts/sramReplace.py 2>&1 | tail -3
          mkdir -p alib-52 logs outputs rpt "outputs/$RUN_TAG" "rpt/$RUN_TAG"
          dc_shell -f ./scripts/dc.tcl -x "set RUN_TAG {$RUN_TAG}" > "logs/dc_${RUN_TAG}.log" 2>&1
          if ! grep -q "DC run complete:" "logs/dc_${RUN_TAG}.log"; then
            echo "=== Synthesis FAILED ==="; tail -20 "logs/dc_${RUN_TAG}.log"; exit 1
          fi
          echo "=== Synthesis PASSED ==="
          cd ..

          echo "=== Stage 3: Copy netlist to power stage ==="
          mkdir -p 3_POWER/netlist
          cp 1_SYN/outputs/$RUN_TAG/* 3_POWER/netlist/ 2>/dev/null || true

          echo "=== Stage 4-5: Mixed simulation (VCS) ==="
          if [ -f "2_POSTSIM/glsim/elf/default.elf" ]; then
            cd 2_POSTSIM/glsim
            export RUN_NAME="${RUN_TAG}_mixed"
            export ELF=elf/default.elf CYCLES=5000000 PROGRESS=200000
            export DUMP_VCD=1 BB_SAIF=1 DUMP_DRAM_TRACE=1
            ./compile_mixed.sh > "build/compile_${RUN_TAG}.log" 2>&1
            ./run_mixed.sh > "results/${RUN_NAME}/sim.log" 2>&1
            cd ../..
            echo "=== Mixed simulation done ==="
          else
            echo "=== Skipped mixed simulation (no ELF) ==="
          fi

          echo "=== Stage 6: PTPX power analysis ==="
          if [ -f "3_POWER/waveform/glsim_mixed.saif" ]; then
            cd 3_POWER && ./run_ptpx > "logs/ptpx_${RUN_TAG}.log" 2>&1 && cd ..
            echo "=== PTPX done ==="
          else
            echo "=== Skipped PTPX (no SAIF) ==="
          fi

          echo "=== Tapeout flow complete ==="

      - name: Collect and summarize PPA
        shell: bash
        if: always()
        run: |
          set +e
          RESULTS=~/tapeout_results
          mkdir -p "$RESULTS/reports" "$RESULTS/netlist" "$RESULTS/logs"

          cp -r ~/Code/tapeout/1_SYN/rpt/* "$RESULTS/reports/" 2>/dev/null || true
          cp -r ~/Code/tapeout/3_POWER/rpt/* "$RESULTS/reports/" 2>/dev/null || true
          LATEST=$(ls -td ~/Code/tapeout/1_SYN/outputs/*/ 2>/dev/null | head -1)
          if [ -n "$LATEST" ] && [ -d "$LATEST" ]; then
            cp "$LATEST"/* "$RESULTS/netlist/" 2>/dev/null || true
          fi
          cp ~/Code/tapeout/1_SYN/logs/* "$RESULTS/logs/" 2>/dev/null || true
          cp ~/Code/tapeout/3_POWER/logs/* "$RESULTS/logs/" 2>/dev/null || true

          echo "============================================"
          echo "  PPA Summary (Synopsys DC @ TSMC28)"
          echo "============================================"
          for rpt in "$RESULTS"/reports/*/*_mapped_area.rpt; do
            [ -f "$rpt" ] || continue
            echo "--- Area ---"
            grep -E "Total cell area" "$rpt" | head -1
          done
          for rpt in "$RESULTS"/reports/*/*_timing_max_path.rpt; do
            [ -f "$rpt" ] || continue
            echo "--- Timing (critical path) ---"
            grep -E "slack" "$rpt" | head -1
          done
          for rpt in "$RESULTS"/reports/*/*_power.rpt; do
            [ -f "$rpt" ] || continue
            echo "--- Power (DC estimate) ---"
            grep -E "Total" "$rpt" | head -1
          done
          for rpt in "$RESULTS"/reports/*/constraint.rpt; do
            [ -f "$rpt" ] || continue
            echo "--- Constraints ---"
            cat "$rpt"
          done
          echo "============================================"

      - name: Upload tapeout artifacts
        if: always()
        uses: actions/upload-artifact@v4
        env:
          ALL_PROXY: ""
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          NO_PROXY: github.com,api.github.com,uploads.github.com,objects.githubusercontent.com,.blob.core.windows.net
        with:
          name: tapeout-ppa-results
          path: ~/tapeout_results/
          retention-days: 30
