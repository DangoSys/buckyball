[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts =
  -v
  -s
  --tb=short
  --strict-markers
  --disable-warnings
  --color=yes
  --html=reports/report.html
  --self-contained-html
  --junit-xml=reports/junit.xml
  --log-file=reports/test.log
  --log-file-level=DEBUG
  --log-cli-level=INFO
  --capture=no
# Allure configuration (when using --allure)
  --alluredir=reports/allure-results
  --clean-alluredir


# Test marker definitions
markers =
  smoke: Quick smoke tests
  verilator: Verilator simulation tests
  vcs: VCS simulation tests

  debug: Debug tests
  fast: Fast tests

  ctest: CTest tests
  mlir: MLIR OpTest tests

# Minimum version requirement
minversion = 6.0

# Test directories
norecursedirs = .git .tox dist build *.egg .venv
